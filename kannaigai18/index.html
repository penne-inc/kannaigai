<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>関内外OPEN!18</title>
    <meta name="description" content="関内外OPEN!18 - みなれたまちの、視点を変える。2026年7月〜2027年2月">

    <!-- OGP -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kannaigai.com/kannaigai18/">
    <meta property="og:title" content="関内外OPEN!18">
    <meta property="og:description" content="みなれたまちの、視点を変える。">
    <meta property="og:image" content="https://kannaigai.com/kannaigai18/image/ogp.png">
    <meta property="og:site_name" content="関内外OPEN!18">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/news.css">

    <!-- Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="config.js"></script>
    <script src="js/news.js"></script>

    <style>
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; color: #1a1a1a; }
        .top-hero {
            text-align: center;
            padding: 80px 24px 48px;
        }
        .top-hero h1 { font-size: 2rem; letter-spacing: 0.06em; margin: 0 0 12px; }
        .top-hero .sub { color: #777; font-size: 1rem; margin: 0 0 8px; }
        .top-hero .period { color: #999; font-size: 0.85rem; margin: 0; }
        .top-note {
            text-align: center;
            font-size: 0.8rem;
            color: #bbb;
            padding: 32px 0 64px;
        }
    </style>
</head>
<body>
    <header class="top-hero">
        <h1>関内外OPEN!18</h1>
        <p class="sub">みなれたまちの、視点を変える。</p>
        <p class="period">2026年7月 〜 2027年2月</p>
    </header>

    <!-- お知らせ一覧 -->
    <main id="top-app" class="news-wrap">
        <div class="news-heading">
            <span class="en">NEWS</span>
            <span class="ja">お知らせ</span>
        </div>

        <div v-if="loading" class="news-loading">読み込み中…</div>
        <div v-else-if="error" class="news-error">お知らせの読み込みに失敗しました。</div>
        <div v-else-if="items.length === 0" class="news-empty">現在お知らせはありません。</div>

        <ul v-else class="news-list">
            <li v-for="item in items" :key="item.slug" class="news-list-item">
                <a :href="'news/?id=' + encodeURIComponent(item.slug)" class="news-list-link">
                    <span class="news-date">{{ item.dateDisplay }}</span>
                    <span class="news-category" :style="{ '--cat-color': item.category.color }">
                        {{ item.category.label }}
                        <span v-if="item.category.viewpoint" class="viewpoint">{{ item.category.viewpoint }}</span>
                    </span>
                    <span class="news-list-title">{{ item.title }}</span>
                </a>
            </li>
        </ul>
    </main>

    <p class="top-note">サイト準備中</p>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return { items: [], loading: true, error: false };
            },
            async mounted() {
                try {
                    this.items = await loadNewsList();
                } catch (e) {
                    console.error(e);
                    this.error = true;
                } finally {
                    this.loading = false;
                }
            }
        }).mount('#top-app');
    </script>
</body>
</html>
