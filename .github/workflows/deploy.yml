name: Build & Deploy to GitHub Pages

on:
  # main への push（admin-news.json やテンプレ更新時）
  push:
    branches: [main]
  # microCMS の webhook から（記事の公開・更新時）
  # event type は限定せず、どんな repository_dispatch でもビルドする
  repository_dispatch:
  # 手動実行 / microCMS の workflow_dispatch 方式にも対応
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに（進行中はキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build kannaigai18 (お知らせ静的生成)
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
        run: node kannaigai18/build/build.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (サイト全体)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
